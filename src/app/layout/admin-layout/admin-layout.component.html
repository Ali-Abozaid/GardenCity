<div class="admin-shell" dir="rtl">
  <aside class="sidebar">
    <div class="profile-card">
      <div class="avatar">{{ profileInitial() }}</div>
      <div class="profile-info">
        <span class="profile-name">{{ currentUser()?.displayedName ?? '...' }}</span>
        <span class="profile-role">{{ getRoleLabel(currentUser()?.role) }}</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      @for (item of navItems(); track item.route) {
        <a
          class="nav-item"
          [routerLink]="item.route"
          routerLinkActive="active"
        >
          @if (item.icon === 'cashier') {
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <rect x="3" y="6" width="18" height="12" rx="2" stroke="currentColor" stroke-width="1.8" />
              <path d="M7 10h4M7 14h2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
              <circle cx="17" cy="12" r="2" stroke="currentColor" stroke-width="1.8" />
            </svg>
          } @else if (item.icon === 'users') {
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="9" cy="8" r="3" stroke="currentColor" stroke-width="1.8" />
              <circle cx="17" cy="9" r="2.5" stroke="currentColor" stroke-width="1.8" />
              <path d="M3 19c0-3 3-5 6-5s6 2 6 5M14 19c0-2 2-3.5 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            </svg>
          } @else if (item.icon === 'games') {
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <rect x="4" y="8" width="16" height="10" rx="2" stroke="currentColor" stroke-width="1.8" />
              <path d="M8 13h2M9 12v2M14 12.5h.01M16 14.5h.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
              <path d="M12 8V5M8 5h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            </svg>
          } @else {
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <rect x="3" y="3" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.8" />
              <rect x="13" y="3" width="8" height="5" rx="1.5" stroke="currentColor" stroke-width="1.8" />
              <rect x="13" y="10" width="8" height="11" rx="1.5" stroke="currentColor" stroke-width="1.8" />
              <rect x="3" y="13" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.8" />
            </svg>
          }
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <button class="logout-btn" type="button" (click)="logout()">تسجيل الخروج</button>
  </aside>

  <div class="main-area">
    <header class="topbar">
      <div class="search-wrap">
        <input type="search" placeholder="بحث..." aria-label="بحث" disabled />
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8" />
          <path d="M20 20l-3.5-3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
        </svg>
      </div>
    </header>

    <main class="content">
      <router-outlet />
    </main>
  </div>
</div>
